<!DOCTYPE html>
<!-- Sayfa dili Türkçe olarak ayarlandı (erişilebilirlik / SEO için) -->
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobil cihazlarda doğru ölçeklenme için viewport etiketi -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Arama motorları ve sosyal paylaşım için sayfa açıklaması -->
    <meta
      name="description"
      content="Şu An (Now Page) — CV'min anlatamadıklarını anlatan, hayatımda şu sıralar neler olduğuna dair canlı ve kişisel bir kesit."
    />
    <meta name="author" content="Ahmet Aksoy" />
    <!-- Tarayıcı arayüz rengi (mobil adres çubuğu vb.) -->
    <meta name="theme-color" content="#faf8f5" />

    <!-- Site ikonu (favicon) — public/ klasöründen gelir -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- === Open Graph / sosyal paylaşım önizlemesi === -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="şu an · Ahmet Aksoy" />
    <meta
      property="og:description"
      content="Hayatımda şu sıralar neler olduğuna dair canlı ve kişisel bir kesit."
    />
    <meta property="og:locale" content="tr_TR" />
    <meta
      property="og:url"
      content="https://ahmetaksoy10.github.io/internet-programlama-final-2026/"
    />
    <!-- Gerçek 1200x630 önizleme görseli (public/og-image.png) -->
    <meta
      property="og:image"
      content="https://ahmetaksoy10.github.io/internet-programlama-final-2026/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://ahmetaksoy10.github.io/internet-programlama-final-2026/og-image.png"
    />

    <!-- === Google Fonts === -->
    <!-- preconnect: font sunucusuna erken bağlanarak yükleme hızını artırır -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Başlıklar için "Outfit", gövde metni için "Nunito" (sıcak/yuvarlak his) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>şu an · Ahmet Aksoy</title>
  </head>
  <body>
    <!-- React uygulamasının bağlanacağı kök element -->
    <div id="root"></div>
    <!-- Uygulamanın giriş noktası -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
