<!DOCTYPE html>
<!-- GitHub Pages, bulunamayan yollarda bu sayfayı gösterir.
     Stiller, ana sayfadan bağımsız çalışsın diye satır içine (inline) yazıldı. -->
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/internet-programlama-final-2026/favicon.svg" />
    <title>404 · Sayfa bulunamadı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Nunito', system-ui, sans-serif;
        color: #2d2d2d;
        background: linear-gradient(160deg, #faf8f5 0%, #f3f0eb 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        text-align: center;
      }
      .box {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-top: 4px solid #ff6b6b;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(120, 90, 60, 0.12);
        padding: 2.5rem 2.25rem;
        max-width: 460px;
      }
      .code {
        font-family: 'Outfit', sans-serif;
        font-size: 4.5rem;
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(120deg, #ff6b6b, #f0a500);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 1.4rem;
        margin: 0.75rem 0 0.5rem;
      }
      p { color: #6f6457; margin-bottom: 1.5rem; }
      a {
        display: inline-block;
        text-decoration: none;
        font-weight: 700;
        color: #fff;
        background: #ff6b6b;
        padding: 0.7rem 1.4rem;
        border-radius: 999px;
        transition: transform 0.2s ease;
      }
      a:hover { transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <main class="box">
      <div class="code">404</div>
      <h1>Bu sayfa "şu an" burada değil</h1>
      <p>Aradığın sayfa bulunamadı. Ana sayfaya dönebilirsin.</p>
      <a href="/internet-programlama-final-2026/">Ana sayfaya dön</a>
    </main>
  </body>
</html>
